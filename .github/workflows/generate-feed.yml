name: Generate Feed

on:
  schedule:
    # 每天 UTC 00:00 运行（北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限才能提交 feed.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate feed
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
        run: node scripts/generate-feed.js

      - name: Commit and push feed.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          # 只有 feed.json 有变化时才提交
          git diff --staged --quiet || git commit -m "chore: update feed $(date -u '+%Y-%m-%d')"
          git push
